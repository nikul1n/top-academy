<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <title>Сотрудники</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --border: #e2e6ea;
      --text: #2c3e50;
      --muted: #6c757d;
      --accent: #3b82f6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family:
        system-ui,
        -apple-system,
        Segoe UI,
        Roboto,
        sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
    }

    .btn {
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background: #2563eb;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    .name {
      font-weight: 600;
      margin-bottom: 6px;
    }

    .role {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .contact {
      font-size: 13px;
      color: var(--muted);
    }

    /* Modal */

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 400px;
      position: relative;
    }

    .modal h2 {
      margin-bottom: 16px;
      font-size: 18px;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 18px;
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
    }

    .close:hover {
      color: #000;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 14px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Сотрудники</h1>
    <button class="btn" data-open-modal>Добавить сотрудника</button>
  </header>

  <div class="grid employees-list">
    <div class="card" data-employee>
      <div class="name">Иван Петров</div>
      <div class="role">Frontend разработчик</div>
      <div class="contact">ivan@example.com</div>
    </div>

    <div class="card" data-employee>
      <div class="name">Мария Смирнова</div>
      <div class="role">Дизайнер</div>
      <div class="contact">maria@example.com</div>
    </div>

    <div class="card" data-employee>
      <div class="name">Алексей Иванов</div>
      <div class="role">Backend разработчик</div>
      <div class="contact">alex@example.com</div>
    </div>

    <div class="card" data-employee>
      <div class="name">Ольга Кузнецова</div>
      <div class="role">HR</div>
      <div class="contact">olga@example.com</div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="close" data-close-modal>&times;</button>
      <h2>Новый сотрудник</h2>
      <form novalidate>
        <input type="text" placeholder="Имя" required />
        <input type="text" placeholder="Должность" required />
        <input type="email" placeholder="Email" required />
        <button type="submit" class="btn">Сохранить</button>
      </form>
    </div>
  </div>

  <script>
    const modal = document.getElementById('modal');
    const openBtn = document.querySelector('[data-open-modal]');
    const closeBtn = document.querySelector('[data-close-modal]');
    const form = modal.querySelector('form');
    const employeesList = document.querySelector('.employees-list');

    const inputName = form.querySelectorAll('input')[0];
    const inputRole = form.querySelectorAll('input')[1];
    const inputEmail = form.querySelectorAll('input')[2];

    let currentEditCard = null;

    function openModal(editCard = null) {
      currentEditCard = editCard;
      if (editCard) {
        modal.querySelector('h2').textContent = 'Редактировать сотрудника';
        inputName.value = editCard.querySelector('.name').textContent;
        inputRole.value = editCard.querySelector('.role').textContent;
        inputEmail.value = editCard.querySelector('.contact').textContent;
      } else {
        modal.querySelector('h2').textContent = 'Новый сотрудник';
        form.reset();
      }
      modal.classList.add('active');
    }

    function closeModal() {
      modal.classList.remove('active');
    }

    // Открытие модального окна для нового сотрудника
    openBtn.addEventListener('click', () => openModal(null));

    // Закрытие при клике на крестик
    closeBtn.addEventListener('click', closeModal);

    // Закрытие при клике по фону (за пределами .modal-content)
    modal.addEventListener('click', (event) => {
      if (!event.target.closest('.modal-content')) {
        closeModal();
      }
    });

    // Открытие модального окна для редактирования сотрудника (делегирование)
    employeesList.addEventListener('click', (event) => {
      const card = event.target.closest('.card');
      if (card) {
        openModal(card);
      }
    });

    // Сохранение (добавление или обновление)
    form.addEventListener('submit', (event) => {
      event.preventDefault();

      if (!inputName.value.trim() || !inputRole.value.trim() || !inputEmail.value.trim()) {
        return;
      }

      if (currentEditCard) {
        // Обновление существующей карточки
        currentEditCard.querySelector('.name').textContent = inputName.value;
        currentEditCard.querySelector('.role').textContent = inputRole.value;
        currentEditCard.querySelector('.contact').textContent = inputEmail.value;
      } else {
        // Создание новой карточки
        const newCard = document.createElement('div');
        newCard.className = 'card';
        newCard.setAttribute('data-employee', '');
        newCard.innerHTML = `
          <div class="name">${inputName.value}</div>
          <div class="role">${inputRole.value}</div>
          <div class="contact">${inputEmail.value}</div>
        `;
        employeesList.appendChild(newCard);
      }

      closeModal();
    });
  </script>
</body>

</html>
